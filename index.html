<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHPC 2026 — Workshop on Virtualization in High-Performance Cloud Computing</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        canvas { display: block; }

        #loader {
            position: fixed;
            inset: 0;
            background: #050508;
            background-image: 
                linear-gradient(#00e5c806 1px, transparent 1px),
                linear-gradient(90deg, #00e5c806 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease, filter 0.8s ease;
            color: #a0aabf;
        }
        #loader.fade-out {
            opacity: 0;
            filter: blur(10px);
            pointer-events: none;
        }

        /* Sandbox Frame */
        .sandbox-frame {
            position: relative;
            width: 800px;
            max-width: 90vw;
            border: 1px solid #1e2430;
            background: #000000c0;
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 229, 200, 0.03);
            opacity: 0;
            transform: scale(0.98);
            animation: frame-reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .sandbox-frame::after {
            content: "WASM_SANDBOX_ENV // SECURE";
            position: absolute;
            top: -10px;
            left: 24px;
            background: #050508;
            padding: 0 12px;
            color: #00e5c8;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Header Layout: Left (Title), Right (Badges) */
        .loader-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed #1e2430;
            padding-bottom: 30px;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .loader-title {
            color: #00e5c8;
            font-size: 56px;
            font-weight: 200;
            letter-spacing: 12px;
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-shadow: 0 0 20px rgba(0, 229, 200, 0.4);
        }
        .loader-title span {
            color: #3a4558;
            text-shadow: none;
        }
        .loader-workshop {
            color: #896FFF;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .isolation-badges {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
            margin-top: 6px;
        }
        .iso-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            letter-spacing: 1.5px;
            padding: 4px 8px;
            border: 1px solid #1e2430;
            border-radius: 2px;
            color: #5c6c80;
            background: rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
        }
        .iso-badge .status {
            color: #00e5c8;
            font-weight: 600;
        }
        .iso-badge .status.warn {
            color: #ffb86c;
        }

        /* Terminal area */
        .terminal {
            background: #020205;
            border: 1px solid #10141d;
            border-radius: 2px;
            padding: 16px;
            height: 160px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
        }
        
        .terminal-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(2,2,5,1) 0%, rgba(2,2,5,0) 25%);
            pointer-events: none;
            z-index: 10;
        }

        .log-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-family: "JetBrains Mono", Consolas, Menlo, Monaco, monospace;
        }

        .log-line {
            font-size: 11px;
            line-height: 1.5;
            color: #5c6c80;
            opacity: 0;
            animation: line-reveal 0.1s ease forwards;
            display: flex;
            align-items: flex-start;
        }
        .log-line .timestamp { color: #3a4558; margin-right: 12px; flex-shrink: 0; }
        .log-line .tag { color: #896FFF; margin-right: 8px; flex-shrink: 0; width: 62px;}
        .log-line .tag.ok { color: #00e5c8; }
        .log-line .tag.warn { color: #ffb86c; }
        .log-line.active { color: #cdd6f4; }
        
        .cursor {
            display: inline-block;
            width: 7px;
            height: 12px;
            background: #00e5c8;
            margin-left: 6px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 10px;
        }
        .loader-bar-track {
            flex-grow: 1;
            height: 2px;
            background: #1e2430;
            border-radius: 1px;
            overflow: hidden;
            position: relative;
        }
        .loader-bar-fill {
            width: 0%;
            height: 100%;
            background: #00e5c8;
            box-shadow: 0 0 10px #00e5c888;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-text {
            font-family: "JetBrains Mono", Consolas, Menlo, Monaco, monospace;
            font-size: 11px;
            color: #00e5c8;
            font-weight: 600;
            width: 48px;
            text-align: right;
            letter-spacing: 1px;
        }

        @keyframes frame-reveal {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes line-reveal {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="sandbox-frame">
            <div class="loader-header">
                <div class="title-group">
                    <div class="loader-title">VHPC<span>2026</span></div>
                    <div class="loader-workshop">Virtualization in High-Performance Cloud</div>
                </div>
                
                <div class="isolation-badges">
                    <div class="iso-badge">JS DOM Access <span class="status warn">REVOKED</span></div>
                    <div class="iso-badge">Execution Context <span class="status">SANDBOXED</span></div>
                    <div class="iso-badge">Memory Space <span class="status">ISOLATED</span></div>
                    <div class="iso-badge">Binary Compute <span class="status">NATIVE</span></div>
                </div>
            </div>

            <div class="terminal">
                <div class="terminal-overlay"></div>
                <div class="log-container" id="term-log">
                    <!-- Logs will be appended here -->
                </div>
            </div>

            <div class="progress-container">
                <div class="loader-bar-track">
                    <div class="loader-bar-fill" id="bar-fill"></div>
                </div>
                <div class="progress-text" id="progress-pct">0.0%</div>
            </div>
        </div>
    </div>

    <canvas id="canvas" data-slint-auto-resize-to-preferred="true" unselectable="on"></canvas>

    <script type="module">
        const bar = document.getElementById('bar-fill');
        const pctText = document.getElementById('progress-pct');
        const loader = document.getElementById('loader');
        const termLog = document.getElementById('term-log');

        const startTime = Date.now();

        function getTimestamp() {
            const ms = Date.now() - startTime;
            const seconds = (ms / 1000).toFixed(3);
            return `[+${seconds.padStart(5, '0')}s]`;
        }

        function addLog(tag, tagClass, message) {
            const lines = termLog.querySelectorAll('.log-line');
            lines.forEach(l => l.classList.remove('active'));
            // Remove cursor from previous lines
            lines.forEach(l => {
                const c = l.querySelector('.cursor');
                if(c) c.remove();
            });

            if (lines.length > 5) {
                // Keep max 6 lines visible given the height
                lines[0].remove();
            }

            const line = document.createElement('div');
            line.className = 'log-line active';
            line.innerHTML = `<span class="timestamp">${getTimestamp()}</span><span class="tag ${tagClass}">[${tag}]</span> <span>${message} <span class="cursor"></span></span>`;
            
            termLog.appendChild(line);
        }

        function setProgress(pct, tag, tagClass, msg) {
            bar.style.width = pct + '%';
            pctText.textContent = pct.toFixed(1) + '%';
            addLog(tag, tagClass, msg);
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Start sequence
        await sleep(400);
        addLog('SYS', 'ok', 'Enforcing WebAssembly sandbox execution boundary...');
        await sleep(600);

        setProgress(12.4, 'NET', 'warn', 'Fetching Rust → Wasm binary payload (vhpc26.wasm)...');
        await sleep(500);

        const module = await import('./pkg/vhpc26.js');

        setProgress(34.2, 'MEM', 'warn', 'Allocating isolated linear memory for WASM runtime...');
        await sleep(350);

        setProgress(51.8, 'SYS', 'ok', 'WebAssembly module instantiated securely.');
        await sleep(400);

        setProgress(68.5, 'RENDER', 'warn', 'Bootstrapping Slint native compositing engine...');
        await sleep(450);

        setProgress(85.0, 'SYS', 'warn', 'Decoupling JavaScript UI thread. Handing over to Canvas/WebGL...');
        try {
            await module.default();
        } catch(e) {
            if (!e.message?.includes("don't mind me")) throw e;
        }

        setProgress(96.5, 'RENDER', 'ok', 'Interface layout mounted to isolated graphics context.');
        await sleep(300);

        setProgress(100.0, 'SYS', 'ok', 'Sandbox locked. Execution environment secured.');
        
        // Remove the cursor from the final line after a brief moment to look cleaner
        setTimeout(() => {
            const c = termLog.querySelector('.cursor');
            if (c) c.style.animation = 'none', c.style.opacity = '1';
        }, 100);

        await sleep(900);

        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 1000); // Wait for the transition
    </script>
</body>
</html>
