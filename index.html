<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHPC 2026 — Workshop on Virtualization in High-Performance Cloud Computing</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        canvas { display: block; }

        #loader {
            position: fixed;
            inset: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }
        #loader.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loader-title {
            color: #00e5c8;
            font-size: 56px;
            font-weight: 200;
            letter-spacing: 12px;
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(10px);
            animation: reveal 1s ease forwards;
        }
        .loader-workshop {
            color: #896FFF;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0;
            animation: reveal 0.8s ease 0.4s forwards;
        }
        .loader-year {
            color: #2C2F36;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 6px;
            margin-bottom: 52px;
            opacity: 0;
            animation: reveal 0.6s ease 0.7s forwards;
        }

        /* Tech stack badges */
        .loader-stack {
            display: flex;
            gap: 24px;
            margin-bottom: 36px;
            opacity: 0;
            animation: reveal 0.6s ease 1.0s forwards;
        }
        .loader-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .loader-badge .badge-label {
            color: #00e5c8;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
        }
        .loader-badge .badge-desc {
            color: #1e2430;
            font-size: 8px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .loader-badge .badge-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #896FFF30;
        }
        .stack-sep {
            display: flex;
            align-items: center;
        }

        /* Progress */
        .loader-bar-track {
            width: 260px;
            height: 1px;
            background: #0a0e14;
            border-radius: 1px;
            overflow: hidden;
            margin-bottom: 14px;
            opacity: 0;
            animation: reveal 0.4s ease 1.3s forwards;
        }
        .loader-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00e5c800, #00e5c8);
            border-radius: 1px;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-status {
            color: #1e2430;
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            opacity: 0;
            animation: reveal 0.4s ease 1.3s forwards;
            transition: color 0.4s ease;
            margin-bottom: 0;
        }
        .loader-status.active {
            color: #3a4558;
        }

        /* Isolation callout */
        .loader-isolation {
            position: fixed;
            bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            animation: reveal 0.6s ease 1.6s forwards;
        }
        .loader-isolation .iso-line {
            width: 20px;
            height: 1px;
            background: #896FFF20;
        }
        .loader-isolation .iso-text {
            color: #12161e;
            font-size: 8px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.6;
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-title">VHPC</div>
        <div class="loader-workshop">Virtualization in High-Performance Cloud Computing</div>
        <div class="loader-year">2026</div>

        <div class="loader-stack">
            <div class="loader-badge">
                <span class="badge-label">Rust</span>
                <span class="badge-desc">compiled native</span>
            </div>
            <div class="stack-sep"><div class="loader-badge badge-dot"></div></div>
            <div class="loader-badge">
                <span class="badge-label">Slint</span>
                <span class="badge-desc">ui framework</span>
            </div>
            <div class="stack-sep"><div class="loader-badge badge-dot"></div></div>
            <div class="loader-badge">
                <span class="badge-label">WebAssembly</span>
                <span class="badge-desc">sandboxed runtime</span>
            </div>
        </div>

        <div class="loader-bar-track">
            <div class="loader-bar-fill" id="bar-fill"></div>
        </div>
        <div class="loader-status" id="load-status">Initializing</div>

        <div class="loader-isolation">
            <div class="iso-line"></div>
            <div class="iso-text">
                This application runs entirely inside a WebAssembly sandbox<br>
                No DOM manipulation · No JavaScript UI · Full browser isolation
            </div>
        </div>
    </div>

    <canvas id="canvas" data-slint-auto-resize-to-preferred="true" unselectable="on"></canvas>

    <script type="module">
        const bar = document.getElementById('bar-fill');
        const status = document.getElementById('load-status');
        const loader = document.getElementById('loader');

        function setProgress(pct, msg) {
            bar.style.width = pct + '%';
            status.textContent = msg;
            status.classList.add('active');
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Wait for entrance animations before starting progress
        await sleep(1800);

        setProgress(10, 'Fetching Rust → Wasm binary');
        await sleep(500);

        const module = await import('./pkg/vhpc26.js');

        setProgress(30, 'Instantiating WebAssembly sandbox');
        await sleep(450);

        setProgress(48, 'Initializing Slint render engine');
        await sleep(400);

        setProgress(62, 'Building isolated UI canvas');
        try {
            await module.default();
        } catch(e) {
            if (!e.message?.includes("don't mind me")) throw e;
        }

        setProgress(78, 'Compositing interface');
        await sleep(500);

        setProgress(90, 'Rendering components');
        await sleep(400);

        setProgress(100, 'Ready');
        await sleep(700);

        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 800);
    </script>
</body>
</html>
